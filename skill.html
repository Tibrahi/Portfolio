<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tech Arsenal</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {}
            }
        }
    </script>
</head>
<body class="transition-colors duration-300 bg-slate-50 dark:bg-gray-950 text-gray-900 dark:text-gray-100 antialiased">

    <div class="fixed top-4 right-4 z-50">
        <button id="theme-toggle" class="p-3 rounded-full bg-gray-200 dark:bg-gray-800 shadow-lg hover:scale-110 transition-transform">
            <i id="theme-icon" class="fa-solid fa-moon text-gray-800 dark:text-yellow-400 text-xl"></i>
        </button>
    </div>

    <section class="min-h-screen py-16 px-4 sm:px-6 lg:px-8">
        <div class="max-w-6xl mx-auto">
            
            <div class="mb-12 text-center">
                <h2 class="text-4xl md:text-5xl font-extrabold tracking-tight mb-4 text-gray-900 dark:text-white">
                    My <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-500 to-emerald-500">Tech Arsenal</span>
                </h2>
                <p class="max-w-2xl mx-auto text-lg text-gray-600 dark:text-gray-400">
                    Technologies I use to build robust, scalable applications, alongside the tools that streamline my workflow.
                </p>
            </div>

            <div id="bento-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
                </div>

            <div class="mt-16 p-8 md:p-10 rounded-3xl border relative overflow-hidden bg-gradient-to-br from-blue-50 to-indigo-50 border-blue-100 dark:from-gray-900 dark:to-gray-800 dark:border-gray-700">
                
                <div class="absolute -top-24 -right-24 w-64 h-64 bg-blue-500/20 rounded-full blur-3xl pointer-events-none"></div>

                <div class="relative z-10">
                    <h3 class="text-2xl font-bold mb-8 flex items-center gap-3 text-gray-900 dark:text-white">
                        <i class="fa-solid fa-network-wired text-blue-500"></i>
                        Learning Roadmap & Future Focus
                    </h3>
                    
                    <div class="grid md:grid-cols-2 gap-8">
                        <div>
                            <h4 class="text-sm font-semibold uppercase tracking-wider mb-4 text-orange-600 dark:text-orange-400">
                                Upcoming (In Progress)
                            </h4>
                            <div id="roadmap-in-progress" class="flex flex-wrap gap-3">
                                </div>
                        </div>
                        
                        <div>
                            <h4 class="text-sm font-semibold uppercase tracking-wider mb-4 text-purple-600 dark:text-purple-400">
                                Post-JS Exploration
                            </h4>
                            <div id="roadmap-future" class="flex flex-wrap gap-3">
                                </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </section>

    <script>
        // 1. Data Structure
        const techStack = {
            frontend: {
                title: "Frontend Development",
                className: "lg:col-span-2",
                items: [
                    { name: 'JavaScript', icon: '<i class="fa-brands fa-js text-yellow-400"></i>' },
                    { name: 'React.js', icon: '<i class="fa-brands fa-react text-blue-500"></i>' },
                    { name: 'HTML5', icon: '<i class="fa-brands fa-html5 text-orange-500"></i>' },
                    { name: 'CSS3', icon: '<i class="fa-brands fa-css3-alt text-blue-500"></i>' },
                    { name: 'Tailwind CSS', icon: '<i class="fa-solid fa-wind text-cyan-400"></i>' },
                    { name: 'Bootstrap', icon: '<i class="fa-brands fa-bootstrap text-purple-500"></i>' },
                ]
            },
            backend: {
                title: "Backend",
                items: [
                    { name: 'Node.js', icon: '<i class="fa-brands fa-node-js text-green-500"></i>' },
                    { name: 'Express.js', icon: '<i class="fa-solid fa-server text-gray-500 dark:text-gray-300"></i>' },
                ]
            },
            databases: {
                title: "Databases",
                items: [
                    { name: 'MongoDB', icon: '<i class="fa-solid fa-leaf text-green-600"></i>' },
                    { name: 'MySQL', icon: '<i class="fa-solid fa-database text-blue-700"></i>' },
                    { name: 'Firebase', icon: '<i class="fa-solid fa-fire text-orange-500"></i>' },
                    { name: 'Browser DB', icon: '<i class="fa-brands fa-chrome text-green-400"></i>' },
                ]
            },
            tools: {
                title: "Tools & Platforms",
                items: [
                    { name: 'VS Code', icon: '<i class="fa-solid fa-code text-blue-500"></i>' },
                    { name: 'Git', icon: '<i class="fa-brands fa-git-alt text-orange-500"></i>' },
                    { name: 'Vercel', icon: '<i class="fa-solid fa-caret-up text-black dark:text-white"></i>' },
                    { name: 'Render', icon: '<i class="fa-solid fa-cloud text-blue-400"></i>' },
                ]
            },
            softSkills: {
                title: "Professional Skills",
                items: [
                    { name: 'Team Lead', icon: '<i class="fa-solid fa-users text-indigo-500"></i>' },
                    { name: 'Project Analysis', icon: '<i class="fa-solid fa-chart-line text-emerald-500"></i>' },
                    { name: 'Communication', icon: '<i class="fa-solid fa-comments text-blue-400"></i>' },
                ]
            }
        };

        const roadmap = {
            inProgress: [
                { name: 'Rust', icon: '<i class="fa-brands fa-rust text-orange-700"></i>' },
                { name: 'Java', icon: '<i class="fa-brands fa-java text-red-500"></i>' },
            ],
            future: [
                { name: 'Game Development', icon: '<i class="fa-solid fa-gamepad text-purple-500"></i>' },
                { name: 'Mobile Apps', icon: '<i class="fa-solid fa-mobile-screen text-blue-500"></i>' },
                { name: 'Advanced JS Ecosystem', icon: '<i class="fa-solid fa-network-wired text-yellow-500"></i>' },
            ]
        };

        // 2. Reusable HTML Generators
        const generateSkillPill = (skill) => `
            <div class="flex items-center gap-2 px-4 py-2 rounded-full border shadow-sm hover:-translate-y-1 transition-transform duration-300 cursor-default bg-white border-gray-200 text-gray-700 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-200">
                <span class="text-lg">${skill.icon}</span>
                <span class="text-sm font-medium">${skill.name}</span>
            </div>
        `;

        const generateBentoCard = (category) => `
            <div class="p-6 rounded-3xl border shadow-sm transition-all duration-300 hover:shadow-md bg-white border-gray-100 dark:bg-gray-800/50 dark:border-gray-700 ${category.className || ''}">
                <h3 class="text-xl font-bold mb-5 tracking-tight text-gray-800 dark:text-white">
                    ${category.title}
                </h3>
                <div class="flex flex-wrap gap-3">
                    ${category.items.map(generateSkillPill).join('')}
                </div>
            </div>
        `;

        // 3. Render Content to the DOM
        document.addEventListener('DOMContentLoaded', () => {
            // Render Tech Stack Grid
            const gridContainer = document.getElementById('bento-grid');
            let gridHTML = '';
            for (const key in techStack) {
                gridHTML += generateBentoCard(techStack[key]);
            }
            gridContainer.innerHTML = gridHTML;

            // Render Roadmap
            document.getElementById('roadmap-in-progress').innerHTML = roadmap.inProgress.map(generateSkillPill).join('');
            document.getElementById('roadmap-future').innerHTML = roadmap.future.map(generateSkillPill).join('');
        });

        // 4. Dark Mode Toggle Logic
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const htmlElement = document.documentElement;

        themeToggleBtn.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            if (htmlElement.classList.contains('dark')) {
                themeIcon.classList.remove('fa-sun');
                themeIcon.classList.add('fa-moon');
            } else {
                themeIcon.classList.remove('fa-moon');
                themeIcon.classList.add('fa-sun');
            }
        });
    </script>
</body>
</html>
